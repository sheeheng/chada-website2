<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chada Entertainment Thailand</title>
<meta name="ext-resource-dependency" content="uploads/compressed-logo.png" data-resource-id="logo"/>
<meta name="ext-resource-dependency" content="uploads/compressed-poster1.jpg" data-resource-id="poster1"/>
<meta name="ext-resource-dependency" content="uploads/compressed-poster2.jpg" data-resource-id="poster2"/>
<meta name="ext-resource-dependency" content="uploads/compressed-poster3.jpg" data-resource-id="poster3"/>
<meta name="ext-resource-dependency" content="uploads/compressed-poster4.jpg" data-resource-id="poster4"/>
<meta name="ext-resource-dependency" content="uploads/compressed-screendaily.png" data-resource-id="screendailyLogo"/>
<template id="__bundler_thumbnail" data-bg-color="#0d1f0d">
  <svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="280" fill="#0d1f0d"/>
    <rect x="0" y="200" width="400" height="80" fill="#1a5c2a" opacity="0.5"/>
    <text x="200" y="125" text-anchor="middle" font-family="serif" font-size="40" fill="#6abf69" letter-spacing="-1">CHADA</text>
    <text x="200" y="160" text-anchor="middle" font-family="serif" font-size="16" fill="rgba(255,255,255,0.5)" letter-spacing="3">ENTERTAINMENT</text>
    <rect x="160" y="175" width="80" height="1.5" fill="#6abf69" opacity="0.4"/>
  </svg>
</template>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: #f8fdf8; color: #1a2e1a; overflow-x: hidden; }
  ::selection { background: #b2dfb2; }
  :root {
    --green-dark: #1a5c2a;
    --green-mid: #2e7d32;
    --green-light: #6abf69;
    --green-pale: #e8f5e9;
    --white: #fafff8;
    --text-dark: #0d1f0d;
    --text-mid: #3a5c3a;
    --text-light: #7aaa7a;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "editorial"
}/*EDITMODE-END*/;

const FILMS = [
  { id: 1, title: "Suffocation", year: 2026, genre: "Horror", status: "International Sales", poster: window.__resources.poster1 },
  { id: 2, title: "Oh My Ghost! Oh My God!", year: 2026, genre: "Horror Comedy", status: "International Sales", poster: window.__resources.poster2 },
  { id: 3, title: "The Dead Echoes", year: 2026, genre: "Horror", status: "International Sales", poster: window.__resources.poster3 },
  { id: 4, title: "Measure in Love", year: 2025, genre: "Romance · Sci-Fi", status: "Released", poster: window.__resources.poster4 },
];

const HERO_FILMS = [
  { title: "Suffocation", subtitle: "Horror · 2026", tagline: "Some things should stay buried.", bg: "#0d1a1a", poster: window.__resources.poster1 },
];

// Film Poster Card
function FilmPoster({ film, onClick }) {
  const [hovered, setHovered] = useState(false);
  return (
    <div onClick={onClick} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{ cursor: 'pointer', transform: hovered ? 'translateY(-6px)' : 'translateY(0)', transition: 'transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)' }}>
      <div style={{ aspectRatio: '2/3', background: film.color||'#1a2e1a', position: 'relative', overflow: 'hidden', marginBottom: 16 }}>
        {film.poster
          ? <img src={film.poster} alt={film.title} style={{ width:'100%',height:'100%',objectFit:'cover',objectPosition:'center top',display:'block' }}/>
          : <>
              <svg style={{ position:'absolute',inset:0,width:'100%',height:'100%',opacity:0.15 }}>
                <defs>
                  <pattern id={`pat-${film.id}`} patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(45)">
                    <line x1="0" y1="0" x2="0" y2="12" stroke="#2e7d32" strokeWidth="1"/>
                  </pattern>
                </defs>
                <rect width="100%" height="100%" fill={`url(#pat-${film.id})`}/>
              </svg>
              <div style={{ position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',padding:20,textAlign:'center' }}>
                <div style={{ fontFamily:'DM Serif Display',fontSize:22,color:'#1a3e1a',lineHeight:1.2 }}>{film.title}</div>
              </div>
            </>
        }
        <div style={{ position:'absolute',inset:0,background:'rgba(0,0,0,0.18)',opacity:hovered?1:0,transition:'opacity 0.3s' }}/>
      </div>
      <div style={{ fontSize:12,color:'var(--text-light)',letterSpacing:'0.09em',textTransform:'uppercase',marginBottom:5 }}>{film.genre} · {film.year}</div>
      <div style={{ fontSize:18,fontWeight:500,color:'var(--text-dark)',marginBottom:8,letterSpacing:'-0.01em' }}>{film.title}</div>
      <span style={{
        fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',padding:'3px 8px',borderRadius:2,
        background: film.status==='Released'?'#e8f5e9':film.status==='International Sales'?'#f0faf0':'#f5f5f5',
        color: film.status==='Released'?'#2e7d32':film.status==='International Sales'?'#388e3c':'#888',
        border:`1px solid ${film.status==='Released'?'#a5d6a7':film.status==='International Sales'?'#c8e6c9':'#e0e0e0'}`,
      }}>{film.status}</span>
    </div>
  );
}

// Hero
function HeroSection({ heroIndex, setHeroIndex }) {
  const film = HERO_FILMS[heroIndex];
  const [fading, setFading] = useState(false);

  useEffect(() => {
    if (HERO_FILMS.length <= 1) return;
    const t = setInterval(() => {
      setFading(true);
      setTimeout(() => { setHeroIndex(i => (i+1) % HERO_FILMS.length); setFading(false); }, 500);
    }, 5500);
    return () => clearInterval(t);
  }, []);

  return (
    <div style={{ width:'100%',height:'100vh',position:'relative',overflow:'hidden',background:film.bg||'#0d1a1a',opacity:fading?0.6:1,transition:'opacity 0.5s' }}>
      {/* Real poster as full-bleed bg */}
      {film.poster && (
        <img src={film.poster} alt={film.title} style={{ position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',objectPosition:'center bottom',filter:'brightness(0.6) saturate(0.85)' }}/>
      )}
      {/* Gradient overlays */}
      <div style={{ position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.1) 60%,transparent 100%)' }}/>
      <div style={{ position:'absolute',inset:0,background:'linear-gradient(to right,rgba(0,0,0,0.3) 0%,transparent 60%)' }}/>
      {/* Film info bottom-left */}
      <div style={{ position:'absolute',bottom:64,left:64,right:64,color:'white' }}>
        <div style={{ fontSize:12,letterSpacing:'0.18em',textTransform:'uppercase',opacity:0.65,marginBottom:14,fontWeight:400 }}>{film.subtitle}</div>
        <div style={{ fontFamily:'DM Serif Display',fontSize:'clamp(52px,7vw,100px)',lineHeight:1,letterSpacing:'-0.025em',marginBottom:18,textShadow:'0 4px 32px rgba(0,0,0,0.5)' }}>{film.title}</div>
        <div style={{ fontSize:19,opacity:0.72,fontStyle:'italic',fontFamily:'DM Serif Display' }}>{film.tagline}</div>
      </div>
      {/* Dots — only show if multiple films */}
      {HERO_FILMS.length > 1 && (
        <div style={{ position:'absolute',bottom:28,left:'50%',transform:'translateX(-50%)',display:'flex',gap:8 }}>
          {HERO_FILMS.map((_,i) => (
            <button key={i} onClick={() => setHeroIndex(i)} style={{ width:i===heroIndex?26:7,height:7,borderRadius:4,background:i===heroIndex?'white':'rgba(255,255,255,0.38)',border:'none',cursor:'pointer',padding:0,transition:'all 0.3s' }}/>
          ))}
        </div>
      )}
    </div>
  );
}

// Nav
function Nav({ menuOpen, toggleMenu }) {
  return (
    <nav style={{ position:'fixed',top:0,left:0,right:0,zIndex:200,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'28px 48px' }}>
      <button onClick={toggleMenu} style={{ background:'none',border:'none',cursor:'pointer',padding:4,display:'flex',flexDirection:'column',gap:5 }}>
        <div style={{ width:28,height:1.5,background:'white',transition:'all 0.3s',transform:menuOpen?'translateY(6.5px) rotate(45deg)':'none' }}/>
        <div style={{ width:20,height:1.5,background:'white',opacity:menuOpen?0:1,transition:'opacity 0.2s' }}/>
        <div style={{ width:28,height:1.5,background:'white',transition:'all 0.3s',transform:menuOpen?'translateY(-6.5px) rotate(-45deg)':'none' }}/>
      </button>
      <div style={{ position:'absolute',left:'50%',transform:'translateX(-50%)' }}>
        <img src={window.__resources.logo} alt="Chada Entertainment Thailand" style={{ height:38,filter:'brightness(0) invert(1)' }}/>
      </div>
      <button style={{ background:'none',border:'none',cursor:'pointer',padding:4 }}>
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="8.5" cy="8.5" r="5.5" stroke="white" strokeWidth="1.5"/>
          <line x1="12.5" y1="12.5" x2="17.5" y2="17.5" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
      </button>
    </nav>
  );
}

// News Page
function NewsPage({ setPage }) {
  const articles = [
    {
      source: 'Screen Daily',
      date: 'April 2026',
      title: "Thailand's Chada Makes FILMART Debut With Genre Slate Including The Dead Echoes",
      excerpt: "Bangkok-based Chada Entertainment is making its Hong Kong FILMART debut this year, bringing a bold genre slate to international buyers — headlined by horror titles The Dead Echoes, Suffocation, and Oh My Ghost! Oh My God!",
      url: 'https://www.screendaily.com/news/thailands-chada-makes-filmart-debut-with-genre-slate-including-the-de4d-echoes/5214822.article',
    },
  ];
  return (
    <div style={{ minHeight:'100vh',background:'var(--white)',paddingTop:100 }}>
      <div style={{ maxWidth:900,margin:'0 auto',padding:'60px 48px' }}>
        <div style={{ marginBottom:64 }}>
          <div style={{ fontSize:12,letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--text-light)',marginBottom:12 }}>Press</div>
          <h1 style={{ fontFamily:'DM Serif Display',fontSize:'clamp(40px,5vw,72px)',lineHeight:1,color:'var(--text-dark)',letterSpacing:'-0.02em' }}>News</h1>
        </div>
        <div style={{ display:'flex',flexDirection:'column',gap:0 }}>
          {articles.map((a,i) => (
            <a key={i} href={a.url} target="_blank" rel="noopener noreferrer" style={{ textDecoration:'none',display:'block',borderTop:'1px solid #d4e8d4',padding:'40px 0',transition:'all 0.2s' }}
              onMouseEnter={e=>e.currentTarget.style.paddingLeft='12px'} onMouseLeave={e=>e.currentTarget.style.paddingLeft='0'}>
              <div style={{ display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:40 }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:'flex',gap:16,alignItems:'center',marginBottom:14 }}>
                    <img src={window.__resources.screendailyLogo} alt="Screen Daily" style={{ height:20,width:'auto',display:'block' }}/>
                    <span style={{ fontSize:11,color:'var(--text-light)',letterSpacing:'0.06em' }}>{a.date}</span>
                  </div>
                  <h2 style={{ fontFamily:'DM Serif Display',fontSize:'clamp(22px,2.5vw,32px)',lineHeight:1.2,color:'var(--text-dark)',marginBottom:14,letterSpacing:'-0.01em',textWrap:'pretty' }}>{a.title}</h2>
                  <p style={{ fontSize:15,lineHeight:1.75,color:'var(--text-mid)',fontWeight:300,maxWidth:680 }}>{a.excerpt}</p>
                </div>
                <div style={{ flexShrink:0,marginTop:4 }}>
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <line x1="4" y1="16" x2="16" y2="4" stroke="var(--green-light)" strokeWidth="1.5" strokeLinecap="round"/>
                    <polyline points="9,4 16,4 16,11" stroke="var(--green-light)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
                  </svg>
                </div>
              </div>
            </a>
          ))}
          <div style={{ borderTop:'1px solid #d4e8d4' }}/>
        </div>
      </div>
      <Footer setPage={setPage}/>
    </div>
  );
}

// Menu Overlay
function MenuOverlay({ open, onClose, setPage }) {
  const links = ['Films','News','About','Contact'];
  const [hov, setHov] = useState(null);
  return (
    <div style={{ position:'fixed',inset:0,zIndex:199,background:'rgba(8,20,8,0.97)',display:'flex',flexDirection:'column',justifyContent:'center',padding:'80px 64px',opacity:open?1:0,pointerEvents:open?'all':'none',transition:'opacity 0.4s' }}>
      {links.map((link,i) => (
        <div key={link} onClick={()=>{setPage(link.toLowerCase());onClose();}} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}
          style={{ fontFamily:'DM Serif Display',fontSize:'clamp(52px,7vw,88px)',lineHeight:1.15,color:hov===i?'#6abf69':'white',cursor:'pointer',letterSpacing:'-0.02em',transform:hov===i?'translateX(14px)':'translateX(0)',transition:'all 0.2s',opacity:open?1:0,transitionDelay:open?`${i*0.07}s`:'0s' }}
        >{link}</div>
      ))}
      <div style={{ marginTop:60,display:'flex',gap:32 }}>
        {['Instagram','Vimeo','IMDb'].map(s=>(
          <div key={s} style={{ fontSize:12,letterSpacing:'0.12em',textTransform:'uppercase',color:'rgba(255,255,255,0.35)',cursor:'pointer' }}
            onMouseEnter={e=>e.target.style.color='#6abf69'} onMouseLeave={e=>e.target.style.color='rgba(255,255,255,0.35)'}>{s}</div>
        ))}
      </div>
      <div style={{ position:'absolute',bottom:48,right:64,fontFamily:'monospace',fontSize:11,color:'rgba(255,255,255,0.18)',letterSpacing:'0.1em' }}>CHADA ENTERTAINMENT · THAILAND</div>
    </div>
  );
}

// Footer
function Footer({ setPage }) {
  return (
    <footer style={{ background:'#0d1f0d',color:'rgba(255,255,255,0.5)',padding:'64px 48px 40px' }}>
      <div style={{ maxWidth:1200,margin:'0 auto' }}>
        <div style={{ display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:60,marginBottom:56 }}>
          <div>
            <img src={window.__resources.logo} alt="Chada Entertainment" style={{ height:44,filter:'brightness(0) invert(1)',opacity:0.85,marginBottom:18 }}/>
            <p style={{ fontSize:14,lineHeight:1.8,maxWidth:300,color:'rgba(255,255,255,0.38)' }}>Where Stories Make Waves.</p>
          </div>
          <div>
            <div style={{ fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:18,color:'rgba(255,255,255,0.25)' }}>Navigate</div>
            {['Films','News','About','Contact'].map(item=>(
              <div key={item} onClick={()=>setPage(item.toLowerCase())} style={{ fontSize:15,marginBottom:10,cursor:'pointer',color:'rgba(255,255,255,0.5)',transition:'color 0.2s' }}
                onMouseEnter={e=>e.target.style.color='#6abf69'} onMouseLeave={e=>e.target.style.color='rgba(255,255,255,0.5)'}>{item}</div>
            ))}
          </div>
          <div>
            <div style={{ fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:18,color:'rgba(255,255,255,0.25)' }}>Connect</div>
            {['Instagram','Vimeo','IMDb','LinkedIn'].map(s=>(
              <div key={s} style={{ fontSize:15,marginBottom:10,cursor:'pointer',color:'rgba(255,255,255,0.5)',transition:'color 0.2s' }}
                onMouseEnter={e=>e.target.style.color='#6abf69'} onMouseLeave={e=>e.target.style.color='rgba(255,255,255,0.5)'}>{s}</div>
            ))}
          </div>
        </div>
        <div style={{ borderTop:'1px solid rgba(255,255,255,0.07)',paddingTop:22,display:'flex',justifyContent:'space-between',fontSize:12,letterSpacing:'0.06em',color:'rgba(255,255,255,0.22)' }}>
          <span>© 2026 Chada Entertainment Thailand. All rights reserved.</span>
          <span style={{ fontFamily:'monospace',fontSize:10,letterSpacing:'0.12em' }}>Bangkok · Thailand</span>
        </div>
      </div>
    </footer>
  );
}

// Home Page
function HomePage({ setPage }) {
  const [heroIndex, setHeroIndex] = useState(0);
  return (
    <div>
      <HeroSection heroIndex={heroIndex} setHeroIndex={setHeroIndex}/>
      {/* Films teaser */}
      <section style={{ background:'var(--white)',padding:'96px 48px' }}>
        <div style={{ maxWidth:1200,margin:'0 auto' }}>
          <div style={{ display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:56 }}>
            <div>
              <div style={{ fontSize:12,letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--text-light)',marginBottom:10 }}>Latest Work</div>
              <h2 style={{ fontFamily:'DM Serif Display',fontSize:'clamp(32px,4vw,56px)',color:'var(--text-dark)',letterSpacing:'-0.02em' }}>Selected Films</h2>
            </div>
            <button onClick={()=>setPage('films')} style={{ padding:'12px 28px',border:'1px solid #c8e6c9',background:'transparent',fontSize:12,letterSpacing:'0.1em',textTransform:'uppercase',cursor:'pointer',color:'var(--text-mid)',fontFamily:'DM Sans',transition:'all 0.2s' }}
              onMouseEnter={e=>{e.target.style.background='var(--green-mid)';e.target.style.color='white';e.target.style.borderColor='var(--green-mid)'}}
              onMouseLeave={e=>{e.target.style.background='transparent';e.target.style.color='var(--text-mid)';e.target.style.borderColor='#c8e6c9'}}
            >View All</button>
          </div>
          <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:40 }}>
            {FILMS.slice(0,3).map(film=><FilmPoster key={film.id} film={film} onClick={()=>setPage('films')}/>)}
          </div>
        </div>
      </section>
      {/* About teaser */}
      <section style={{ background:'#e8f5e9',padding:'96px 48px' }}>
        <div style={{ maxWidth:1200,margin:'0 auto',display:'grid',gridTemplateColumns:'1fr 1fr',gap:80,alignItems:'center' }}>
          <div>
            <div style={{ fontSize:12,letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--text-light)',marginBottom:16 }}>About Chada</div>
            <h2 style={{ fontFamily:'DM Serif Display',fontSize:'clamp(32px,3.5vw,52px)',lineHeight:1.1,color:'var(--text-dark)',marginBottom:24,letterSpacing:'-0.02em' }}>Stories rooted in Thailand,<br/><em>told for the world</em></h2>
            <p style={{ fontSize:17,lineHeight:1.8,color:'var(--text-mid)',fontWeight:300,marginBottom:32,textWrap:'pretty' }}>For over two decades, Chada Entertainment has championed Southeast Asian cinema on the international stage — producing and selling films that carry the spirit of Thailand across 50+ global markets.</p>
            <button onClick={()=>setPage('about')} style={{ padding:'14px 32px',background:'var(--green-dark)',color:'white',border:'none',fontSize:12,letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer',fontFamily:'DM Sans',transition:'background 0.2s' }}
              onMouseEnter={e=>e.target.style.background='var(--green-mid)'} onMouseLeave={e=>e.target.style.background='var(--green-dark)'}
            >Our Story</button>
          </div>
          <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:2 }}>
            {[['20+','Years'],['50+','Markets'],['100+','Films'],['Global','Reach']].map(([n,l])=>(
              <div key={l} style={{ background:'white',padding:'40px 32px' }}>
                <div style={{ fontFamily:'DM Serif Display',fontSize:52,color:'var(--green-mid)',lineHeight:1,marginBottom:6 }}>{n}</div>
                <div style={{ fontSize:12,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text-light)' }}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      </section>
      <Footer setPage={setPage}/>
    </div>
  );
}

// Films Page
function FilmsPage({ setPage }) {
  const [filter, setFilter] = useState('All');
  const filters = ['All','Released','International Sales','In Development','Post-Production'];
  const filtered = filter==='All' ? FILMS : FILMS.filter(f=>f.status===filter);
  return (
    <div style={{ minHeight:'100vh',background:'var(--white)',paddingTop:100 }}>
      <div style={{ maxWidth:1200,margin:'0 auto',padding:'60px 48px' }}>
        <div style={{ marginBottom:60 }}>
          <div style={{ fontSize:12,letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--text-light)',marginBottom:12 }}>Our Work</div>
          <h1 style={{ fontFamily:'DM Serif Display',fontSize:'clamp(40px,5vw,72px)',lineHeight:1,color:'var(--text-dark)',letterSpacing:'-0.02em',marginBottom:32 }}>Films</h1>
          <div style={{ display:'flex',gap:8,flexWrap:'wrap' }}>
            {filters.map(f=>(
              <button key={f} onClick={()=>setFilter(f)} style={{ padding:'8px 18px',border:`1px solid ${filter===f?'var(--green-mid)':'#d4e8d4'}`,borderRadius:2,background:filter===f?'var(--green-mid)':'transparent',color:filter===f?'white':'var(--text-mid)',fontSize:12,letterSpacing:'0.08em',cursor:'pointer',transition:'all 0.2s',fontFamily:'DM Sans' }}>{f}</button>
            ))}
          </div>
        </div>
        <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:44 }}>
          {filtered.map(film=><FilmPoster key={film.id} film={film} onClick={()=>{}}/>)}
        </div>
      </div>
      <Footer setPage={setPage}/>
    </div>
  );
}

// About Page
function AboutPage({ setPage }) {
  return (
    <div style={{ minHeight:'100vh',background:'var(--white)',paddingTop:100 }}>
      <div style={{ maxWidth:1200,margin:'0 auto',padding:'60px 48px' }}>
        <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:80,marginBottom:96,alignItems:'end' }}>
          <div>

// Contact Page
function ContactPage({ setPage }) {
  const [form, setForm] = useState({name:'',email:'',company:'',type:'General Inquiry',message:''});
  const [errors, setErrors] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Required';
    if (!form.email.trim() || !/\S+@\S+\.\S+/.test(form.email)) e.email = 'Valid email required';
    if (!form.message.trim()) e.message = 'Required';
    return e;
  };

  const handleSubmit = ev => {
    ev.preventDefault();
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setSubmitted(true);
  };

  if (submitted) return (
    <div style={{ minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--white)' }}>
      <div style={{ textAlign:'center',maxWidth:480 }}>
        <div style={{ width:56,height:56,borderRadius:'50%',background:'#e8f5e9',border:'2px solid #a5d6a7',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 28px' }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="#2e7d32" strokeWidth="2" strokeLinecap="round"/></svg>
        </div>
        <h2 style={{ fontFamily:'DM Serif Display',fontSize:40,marginBottom:14,color:'var(--text-dark)' }}>Message Sent</h2>
        <p style={{ color:'var(--text-mid)',lineHeight:1.7 }}>Thank you for reaching out. We'll be in touch shortly.</p>
      </div>
    </div>
  );

  const base = (field) => ({ width:'100%',padding:'14px 0',border:'none',borderBottom:`1px solid ${errors[field]?'#e57373':'#c8e6c9'}`,background:'transparent',fontSize:16,fontFamily:'DM Sans',color:'var(--text-dark)',outline:'none' });
  const label = { fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text-light)',display:'block',marginBottom:8 };

  return (
    <div style={{ minHeight:'100vh',background:'var(--white)',paddingTop:100 }}>
      <div style={{ maxWidth:1200,margin:'0 auto',padding:'60px 48px' }}>
        <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:100,alignItems:'start' }}>
          <div>
            <div style={{ fontSize:12,letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--text-light)',marginBottom:12 }}>Get In Touch</div>
            <h1 style={{ fontFamily:'DM Serif Display',fontSize:'clamp(40px,4vw,64px)',lineHeight:1,color:'var(--text-dark)',letterSpacing:'-0.02em',marginBottom:32 }}>Let's work<br/><em>together</em></h1>
            <div style={{ display:'flex',flexDirection:'column',gap:28,marginTop:48 }}>
              {[{l:'Production',v:'sheeheng@chadaent.pro'},{l:'Sales',v:'sales@chadaent.pro'}].map(({l,v})=>(
                <div key={l}>
                  <div style={{ fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--text-light)',marginBottom:4 }}>{l}</div>
                  <div style={{ fontSize:16,color:'var(--text-dark)' }}>{v}</div>
                </div>
              ))}
            </div>
          </div>
          <form onSubmit={handleSubmit} style={{ display:'flex',flexDirection:'column',gap:28 }}>
            {[{id:'name',lbl:'Your Name',type:'text'},{id:'email',lbl:'Email Address',type:'email'},{id:'company',lbl:'Company (optional)',type:'text'}].map(({id,lbl,type})=>(
              <div key={id}>
                <label style={label}>{lbl}</label>
                <input type={type} value={form[id]} onChange={e=>setForm({...form,[id]:e.target.value})} style={base(id)}/>
                {errors[id]&&<div style={{fontSize:11,color:'#c62828',marginTop:4}}>{errors[id]}</div>}
              </div>
            ))}
            <div>
              <label style={label}>Inquiry Type</label>
              <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})} style={{...base(),cursor:'pointer'}}>
                {['General Inquiry','Film Sales','Co-production','Press & Media','Other'].map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
            <div>
              <label style={label}>Message</label>
              <textarea value={form.message} onChange={e=>setForm({...form,message:e.target.value})} rows={5} style={{...base('message'),resize:'vertical'}}/>
              {errors.message&&<div style={{fontSize:11,color:'#c62828',marginTop:4}}>{errors.message}</div>}
            </div>
            <button type="submit" style={{ padding:'16px 32px',background:'var(--green-mid)',color:'white',border:'none',fontSize:12,letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer',fontFamily:'DM Sans',fontWeight:500,alignSelf:'flex-start',transition:'background 0.2s' }}
              onMouseEnter={e=>e.target.style.background='var(--green-dark)'} onMouseLeave={e=>e.target.style.background='var(--green-mid)'}
            >Send Message</button>
          </form>
        </div>
      </div>
      <Footer setPage={setPage}/>
    </div>
  );
}

// Tweaks Panel
function TweaksPanel({ visible }) {
  const [theme, setTheme] = useState(TWEAK_DEFAULTS.theme);

  const applyTheme = (t) => {
    const r = document.documentElement;
    if (t === 'dark') {
      r.style.setProperty('--white','#0d1f0d');
      r.style.setProperty('--text-dark','#e8f5e8');
      r.style.setProperty('--text-mid','#8dc88d');
      r.style.setProperty('--text-light','#4a8a4a');
      document.body.style.background='#0d1f0d';
    } else if (t === 'editorial') {
      r.style.setProperty('--white','#f2faf2');
      r.style.setProperty('--text-dark','#0d2e0d');
      r.style.setProperty('--text-mid','#2e5c2e');
      r.style.setProperty('--text-light','#6a9a6a');
      document.body.style.background='#f2faf2';
    } else {
      r.style.setProperty('--white','#fafff8');
      r.style.setProperty('--text-dark','#0d1f0d');
      r.style.setProperty('--text-mid','#3a5c3a');
      r.style.setProperty('--text-light','#7aaa7a');
      document.body.style.background='#f8fdf8';
    }
    setTheme(t);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{theme:t}},'*');
  };

  const options = [
    {id:'light',label:'🌿 Light / Spring',desc:'White + sage green'},
    {id:'dark',label:'🌑 Cinematic Dark',desc:'Forest + neon green'},
    {id:'editorial',label:'📰 Editorial Split',desc:'Cooler muted two-tone'},
  ];

  return (
    <div style={{ position:'fixed',bottom:24,right:24,zIndex:9999,background:'white',border:'1px solid #c8e6c9',borderRadius:4,padding:24,width:260,boxShadow:'0 8px 32px rgba(0,0,0,0.08)',opacity:visible?1:0,pointerEvents:visible?'all':'none',transform:visible?'translateY(0)':'translateY(8px)',transition:'all 0.25s' }}>
      <div style={{ fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--text-light)',marginBottom:16,fontWeight:600 }}>Tweaks</div>
      <div style={{ fontSize:12,color:'var(--text-mid)',marginBottom:10,fontWeight:500 }}>Theme Variation</div>
      <div style={{ display:'flex',flexDirection:'column',gap:8 }}>
        {options.map(o=>(
          <button key={o.id} onClick={()=>applyTheme(o.id)} style={{ padding:'10px 12px',border:`1px solid ${theme===o.id?'#2e7d32':'#d4e8d4'}`,borderRadius:2,background:theme===o.id?'#e8f5e9':'transparent',textAlign:'left',cursor:'pointer',fontFamily:'DM Sans',transition:'all 0.15s' }}>
            <div style={{ fontSize:13,color:'var(--text-dark)',fontWeight:theme===o.id?500:400 }}>{o.label}</div>
            <div style={{ fontSize:11,color:'var(--text-light)',marginTop:2 }}>{o.desc}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

// App
function App() {
  const [menuOpen, setMenuOpen] = useState(false);
  const [page, setPage] = useState(() => localStorage.getItem('chada_page')||'home');
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(() => {
    localStorage.setItem('chada_page', page);
    window.scrollTo({top:0,behavior:'smooth'});
  }, [page]);

  useEffect(() => {
    const h = e => {
      if (e.data?.type==='__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', h);
  }, []);

  const renderPage = () => {
    switch(page) {
      case 'films': return <FilmsPage setPage={setPage}/>;
      case 'news': return <NewsPage setPage={setPage}/>;
      case 'about': return <AboutPage setPage={setPage}/>;
      case 'contact': return <ContactPage setPage={setPage}/>;
      default: return <HomePage setPage={setPage}/>;
    }
  };

  return (
    <>
      <Nav menuOpen={menuOpen} toggleMenu={()=>setMenuOpen(o=>!o)}/>
      <MenuOverlay open={menuOpen} onClose={()=>setMenuOpen(false)} setPage={setPage}/>
      {renderPage()}
      <TweaksPanel visible={tweaksVisible}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
